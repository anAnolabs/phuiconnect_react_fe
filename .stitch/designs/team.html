<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PhuiConnect - Team Profile Feed Variant 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2fc173",
              "background-light": "#f6f8f7",
              "background-dark": "#131f19",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen">
<div class="max-w-[480px] mx-auto bg-white dark:bg-[#1a2b22] min-h-screen relative shadow-xl">
<!-- Header -->
<header class="flex items-center p-4 pb-2 justify-between bg-white dark:bg-[#1a2b22] sticky top-0 z-10 border-b border-primary/10">
<h1 class="text-xl font-bold tracking-tight text-primary">PhuiConnect</h1>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-primary/10 text-slate-700 dark:text-slate-300 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<!-- Search -->
<div class="px-4 py-3 bg-white dark:bg-[#1a2b22]">
<div class="flex items-center bg-background-light dark:bg-[#131f19] rounded-xl h-12 px-3 border border-primary/10">
<span class="material-symbols-outlined text-slate-400">search</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-sm placeholder:text-slate-400 dark:text-white" placeholder="Search teams, players, matches" type="text"/>
</div>
</div>
<!-- Hero Section -->
<div class="relative">
<div class="w-full h-48 bg-cover bg-center" data-alt="Team group photo banner" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAUHWTxMXhlFS6PZU00_lW0keXQMmodYni1aQKAcVfyljhTT9Vtgx9ODdfNr_Dw01TEXDg1k0bF00mD4kFvekLv1lfcoD-rI30zoTKxhyp-UigaLW5DBQZWVaR3CpCk0ohxTk_iJVB-vt9Keo331GBC__3wnyW3Aor6IXx05J2pP-TKYgkPWDpxUHmEOplZmlhDXFdiy1-5WJ3MNYxe-4BiS-7RYjDJhkXlt2aUWDrgcSrwIYBUW4eTczvA8NGqHaGNNPJ9yO8I-cw');"></div>
<div class="absolute -bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center">
<div class="w-24 h-24 rounded-full border-4 border-white dark:border-[#1a2b22] bg-cover bg-center shadow-md bg-white" data-alt="Team logo circle" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuClGrSyrZqWKieuGEt17OrwAEc8zYQWkba9IvyKo-bWdDYne8ARd2AYNFylpZ3G1R1C8bxXpOXfyAe5-ZVZt6qgOQPfM7fHcOsJomsKS5561flpUFucscoUZeycvsMf6RakitGk-NJZQNhbQq_1T3zUSmH7_6wGETbYtanOnu_qmUTE-jB9DBsdlTwyNiVRJYCJIeSuK5P2qy68XPc7aVYxXWYiq8rT_yrHpzP9_vRgiH9AC95FzTN1ZPN7GUTcqa5_u2StGCGQLE4');"></div>
</div>
</div>
<!-- Team Info -->
<div class="pt-16 px-4 text-center">
<h2 class="text-2xl font-bold">Phui United</h2>
<p class="text-slate-500 dark:text-slate-400 mt-1">Amateur Football Club • Established 2021</p>
</div>
<!-- Stats -->
<div class="flex gap-3 px-4 py-6">
<div class="flex-1 bg-background-light dark:bg-[#131f19] rounded-xl p-4 text-center border border-primary/10">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Wins</p>
<p class="text-2xl font-bold text-primary">15</p>
</div>
<div class="flex-1 bg-background-light dark:bg-[#131f19] rounded-xl p-4 text-center border border-primary/10">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Draws</p>
<p class="text-2xl font-bold text-slate-700 dark:text-slate-300">4</p>
</div>
<div class="flex-1 bg-background-light dark:bg-[#131f19] rounded-xl p-4 text-center border border-primary/10">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Losses</p>
<p class="text-2xl font-bold text-red-500">2</p>
</div>
</div>
<!-- Actions -->
<div class="flex gap-3 px-4 pb-6 border-b border-primary/10">
<button class="flex-1 bg-primary text-white font-semibold py-3 rounded-xl shadow-sm hover:bg-primary/90 transition-colors">
                Challenge Team
            </button>
<button class="flex-1 bg-primary/10 text-primary font-semibold py-3 rounded-xl hover:bg-primary/20 transition-colors">
                Recruit Player
            </button>
</div>
<!-- Tabs -->
<div class="flex border-b border-primary/10 px-4">
<button class="flex-1 py-4 text-primary font-semibold border-b-2 border-primary">Feed</button>
<button class="flex-1 py-4 text-slate-500 dark:text-slate-400 font-medium hover:text-slate-700 dark:hover:text-slate-200">Members</button>
<button class="flex-1 py-4 text-slate-500 dark:text-slate-400 font-medium hover:text-slate-700 dark:hover:text-slate-200">Matches</button>
</div>
<!-- Feed Content -->
<div class="p-4 bg-background-light dark:bg-[#131f19] min-h-[300px]">
<!-- Post Card -->
<div class="bg-white dark:bg-[#1a2b22] rounded-xl shadow-sm overflow-hidden border border-primary/5 mb-4">
<div class="p-4 flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-cover bg-center bg-background-light" data-alt="Team logo thumbnail" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBO3IbAEsC_Y2w_zPZ5x0Gbgotl9nay7CLQLWWWGSOiZg_1uR9IGYWfcJkhPkHgjvrVDUQydD0CJrEcjglKNg7Bk_JWzKuCB4oibNzvPl7Mvsb-lTWJHOg7QxXHfBseH7JSCJANGgvlhfxhvuGbdT5_yULJRNjy9vR2vJFre47CaFvuTOLCSwxr-Z-prHH6LesTwSv2p3RGxh9DHCE6Vh2D05F-bkv3AhNA5FbFiHbDP7t1D79L3Bruka-ondkZ63fPxqFVOKoAPdQ');"></div>
<div>
<p class="font-semibold text-sm">Phui United</p>
<p class="text-xs text-slate-500 dark:text-slate-400">2 hours ago</p>
</div>
</div>
<div class="px-4 pb-3">
<p class="text-sm text-slate-700 dark:text-slate-300">What a match! Solid defense and a late winner to take all 3 points. Great effort from the squad today. 🟢⚪</p>
</div>
<div class="w-full aspect-video bg-cover bg-center" data-alt="Match action shot" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDUkJqpY3-v__pK0CODY1LybLOib4kW62vTARSzSLK3SIn0zgLQSQMRc9k4KUQa5u9ojg5KQyiDPTYwgJgttNUpNihLiB1tFhDnIUehIjovhYqAm99JKAVnA9ZxFbhrs1Byla16IUkeNk5V_OZXM4Zr7c7BAtopAXp_8GGr2uJ2bVDVPdH6UjMPT8IszEtV3Y5t2mO5zmx54FCwhcT6uF9tF26PFun9YMdX4zKUTlNZ9cRJqJth7B0q1Vnd1MDtwuCBlkCJqsEi1uw');"></div>
<div class="p-4 flex justify-between items-center bg-primary/5">
<div class="flex items-center gap-2">
<span class="font-bold">Phui United</span>
<span class="text-primary font-bold">2 - 1</span>
<span class="font-bold text-slate-600 dark:text-slate-400">FC Kaki</span>
</div>
<span class="text-xs font-medium text-primary bg-primary/10 px-2 py-1 rounded">Full Time</span>
</div>
<div class="px-4 py-3 border-t border-primary/10 flex gap-4">
<button class="flex items-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">thumb_up</span>
<span class="text-sm font-medium">24</span>
</button>
<button class="flex items-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">chat_bubble</span>
<span class="text-sm font-medium">5</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
