<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PhuiConnect Login Screen Variant 1</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2fc17d",
                        "background-light": "#f6f8f7",
                        "background-dark": "#131f19",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
<div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-xl shadow-sm overflow-hidden flex flex-col">
<!-- Hero Section -->
<div class="pt-10 pb-6 px-6 text-center">
<h1 class="text-3xl font-bold text-primary mb-2 tracking-tight">PhuiConnect</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Kết nối đam mê bóng đá phủi</p>
</div>
<!-- Login Form -->
<div class="px-6 py-4 space-y-4">
<div>
<input class="w-full h-12 px-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-colors" placeholder="Phone number / Email" type="text"/>
</div>
<div>
<input class="w-full h-12 px-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-colors" placeholder="Password" type="password"/>
</div>
<div class="flex justify-end">
<a class="text-sm text-primary font-medium hover:underline" href="#">Quên mật khẩu?</a>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-semibold rounded-lg transition-colors flex items-center justify-center">
                Đăng nhập
            </button>
</div>
<!-- Divider -->
<div class="flex items-center justify-center px-6 py-4">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="px-3 text-sm text-slate-400 dark:text-slate-500 bg-white dark:bg-slate-800">Hoặc</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<!-- Alternative Logins -->
<div class="px-6 py-2 flex justify-center gap-4">
<button class="w-12 h-12 rounded-full border border-slate-300 dark:border-slate-600 flex items-center justify-center hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-red-500">mail</span>
</button>
<button class="w-12 h-12 rounded-full border border-slate-300 dark:border-slate-600 flex items-center justify-center hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-blue-600">social_leaderboard</span>
</button>
</div>
<!-- Secondary CTA -->
<div class="px-6 py-4 pb-6">
<button class="w-full h-12 border-2 border-primary text-primary font-semibold rounded-lg hover:bg-primary/5 transition-colors flex items-center justify-center">
                Trải nghiệm ngay
            </button>
</div>
<!-- Footer -->
<div class="bg-slate-50 dark:bg-slate-800/50 py-4 text-center border-t border-slate-100 dark:border-slate-700">
<p class="text-sm text-slate-600 dark:text-slate-400">
                 Chưa có tài khoản? <a class="text-primary font-semibold hover:underline" href="#">Đăng ký ngay</a>
</p>
</div>
</div>
</body></html>
